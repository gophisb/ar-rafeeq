<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم — الرفيق</title>
<link rel="stylesheet" href="./style.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>
<style>
  .container{max-width:760px;margin:0 auto;padding:16px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;}
  .back{color:var(--gold);text-decoration:none;font-size:14px;font-weight:600;}
  h1{text-align:center;font-size:26px;color:var(--gold-soft);margin:6px 0 2px;}
  .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:6px;}
  .riwaya-badge{display:block;text-align:center;font-size:12px;color:var(--gold);
    background:rgba(212,175,55,0.08);border-radius:99px;padding:4px 12px;width:fit-content;margin:8px auto 18px;border:1px solid var(--border);}

  .search-box{position:relative;margin-bottom:16px;}
  .search-box input{width:100%;padding:13px 44px 13px 16px;border-radius:14px;border:1px solid var(--border);
    background:var(--card);backdrop-filter:blur(12px);font-size:15px;font-family:inherit;color:var(--text);}
  .search-box input:focus{outline:2px solid var(--gold);}
  .search-box .ic{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);}

  #surahGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
  .surah-chip{background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.15s;backdrop-filter:blur(8px);}
  .surah-chip:active{transform:scale(0.97);}
  .surah-chip:hover{border-color:var(--gold);}
  .surah-num{flex-shrink:0;width:30px;height:30px;border-radius:8px;background:var(--gold);
    color:#080B10;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
  .surah-name{font-weight:700;font-size:14.5px;color:var(--text);}
  .surah-meta{font-size:11px;color:var(--muted);}

  #readerView{display:none;}
  .reader-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .reader-title{font-size:20px;font-weight:800;color:var(--gold-soft);}
  .reader-meta{font-size:12px;color:var(--muted);}
  .surah-nav{display:flex;gap:8px;flex-wrap:wrap;}
  .nav-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;
    padding:8px 12px;cursor:pointer;font-size:13px;color:var(--gold);backdrop-filter:blur(8px);}
  .nav-btn:disabled{opacity:0.3;cursor:default;}
  .nav-btn:hover:not(:disabled){border-color:var(--gold);}

  .bismillah{text-align:center;font-family:'Amiri',serif;font-size:24px;color:var(--gold-soft);
    margin:14px 0 20px;}

  .ayah-block{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
    padding:20px;margin-bottom:12px;backdrop-filter:blur(8px);}
  .ayah-arabic{font-family:'Amiri',serif;font-size:24px;line-height:2.1;color:var(--text);
    text-align:right;margin-bottom:10px;}
  .ayah-number-badge{display:inline-flex;align-items:center;justify-content:center;
    width:26px;height:26px;border-radius:50%;background:var(--gold);color:#080B10;font-size:11px;
    font-family:-apple-system,sans-serif;font-weight:700;vertical-align:middle;margin-inline-start:6px;}
  .tafsir-toggle{font-size:12.5px;color:var(--gold);cursor:pointer;font-weight:600;
    display:inline-block;margin-top:4px;}
  .tafsir-text{display:none;background:rgba(212,175,55,0.06);border-right:4px solid var(--gold);
    border-radius:8px;padding:10px 14px;margin-top:10px;font-size:14px;color:var(--text);
    font-family:-apple-system,sans-serif;line-height:1.8;}
  .tafsir-text.open{display:block;}

  #status{text-align:center;color:var(--muted);padding:40px 0;}
  footer{text-align:center;padding:24px 0 10px;color:var(--muted);font-size:12px;}
  @media (max-width:600px){.ayah-arabic{font-size:20px;}}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a class="back" href="./index.html">→ الرئيسية</a>
    <span style="font-size:22px;">📖</span>
  </div>
  <h1>القرآن الكريم</h1>
  <p class="sub">114 سورة كاملة — 6236 آية</p>
  <div class="riwaya-badge">📜 رواية حفص عن عاصم — المصحف العثماني</div>

  <div id="listView">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="ابحث باسم السورة...">
      <span class="ic">🔍</span>
    </div>
    <div id="surahGrid"></div>
  </div>

  <div id="readerView">
    <div class="reader-head">
      <div>
        <div class="reader-title" id="readerTitle">—</div>
        <div class="reader-meta" id="readerMeta">—</div>
      </div>
      <div class="surah-nav">
        <button class="nav-btn" id="prevSurah">‹ السابقة</button>
        <button class="nav-btn" id="closeSurah">☰ الفهرس</button>
        <button class="nav-btn" id="nextSurah">التالية ›</button>
      </div>
    </div>
    <div id="bismillahBox"></div>
    <div id="status">جاري تحميل السورة...</div>
    <div id="ayahList"></div>
  </div>

  <footer>الرفيق — القرآن الكريم (حفص عن عاصم) والتفسير الميسّر، عبر Al Quran Cloud API</footer>
</div>

  {n:114,name:'الناس',ayahs:6,type:'مكية'} // 🔴 السورة الأخيرة، موجودة
];

// ===== باقي الكود =====
const surahSearchIndex = lunr(function () {
  this.ref('n');
  this.field('name');
  SURAH_LIST.forEach(s => this.add(s));
});

function renderGrid(list){
  document.getElementById('surahGrid').innerHTML = list.map(s=>`
    <div class="surah-chip" data-n="${s.n}">
      <div class="surah-num">${s.n}</div>
      <div>
        <div class="surah-name">${s.name}</div>
        <div class="surah-meta">${s.type} — ${s.ayahs} آية</div>
      </div>
    </div>
  `).join('');
  document.querySelectorAll('.surah-chip').forEach(chip=>{
    chip.addEventListener('click', ()=> openSurah(parseInt(chip.dataset.n,10)));
  });
}

document.getElementById('searchInput').addEventListener('input', e=>{
  const q = e.target.value.trim();
  if(!q){ renderGrid(SURAH_LIST); return; }
  let results = [];
  try{ results = surahSearchIndex.search(`${q}* ${q}~1`); }catch(err){ results = []; }
  if(results.length){
    const byN = Object.fromEntries(SURAH_LIST.map(s=>[String(s.n), s]));
    renderGrid(results.map(r => byN[r.ref]));
  } else {
    renderGrid(SURAH_LIST.filter(s=>s.name.includes(q)));
  }
});

let currentSurah = 1;
const cache = {};

function openSurah(n){
  currentSurah = n;
  document.getElementById('listView').style.display = 'none';
  document.getElementById('readerView').style.display = 'block';
  window.scrollTo(0,0);
  loadSurah(n);
}

document.getElementById('closeSurah').addEventListener('click', ()=>{
  document.getElementById('readerView').style.display = 'none';
  document.getElementById('listView').style.display = 'block';
});
document.getElementById('prevSurah').addEventListener('click', ()=>{
  if(currentSurah > 1) openSurah(currentSurah - 1);
});
document.getElementById('nextSurah').addEventListener('click', ()=>{
  if(currentSurah < 114) openSurah(currentSurah + 1);
});

let localQuranPromise = null;
function loadLocalQuran(){
  if(!localQuranPromise){
    localQuranPromise = fetch('./quran-local.json')
      .then(r => r.json())
      .then(data => {
        const bySurah = {};
        data.forEach(s => { bySurah[s.i] = s.a.map(a => ({ numberInSurah: a.n, text: a.t })); });
        return bySurah;
      });
  }
  return localQuranPromise;
}

function loadSurah(n){
  const meta = SURAH_LIST[n-1];
  document.getElementById('readerTitle').textContent = `سورة ${meta.name}`;
  document.getElementById('readerMeta').textContent = `${meta.type} — ${meta.ayahs} آية`;
  document.getElementById('prevSurah').disabled = n===1;
  document.getElementById('nextSurah').disabled = n===114;
  document.getElementById('bismillahBox').innerHTML = (n!==1 && n!==9)
    ? `<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>` : '';
  document.getElementById('ayahList').innerHTML = '';
  document.getElementById('status').hidden = false;
  document.getElementById('status').textContent = 'جاري تحميل السورة...';

  if(cache[n]){ renderAyahs(cache[n]); attachTafsir(n); return; }

  loadLocalQuran().then(bySurah => {
    const ayahs = bySurah[n].map(a => ({ ...a, tafsir: '' }));
    cache[n] = ayahs;
    renderAyahs(ayahs);
    document.getElementById('status').hidden = true;
    attachTafsir(n);
  }).catch(()=>{
    document.getElementById('status').textContent =
      'تعذّر تحميل ملف القرآن المحلي (quran-local.json). تأكد أن الملف مرفوع بجانب index.html.';
  });
}

function attachTafsir(n){
  fetch(`https://api.alquran.cloud/v1/surah/${n}/edition/ar.muyassar`)
    .then(r=>r.json())
    .then(data=>{
      const tafsirAyahs = data.data.ayahs;
      cache[n].forEach((a,i)=>{ a.tafsir = tafsirAyahs[i] ? tafsirAyahs[i].text : ''; });
      renderAyahs(cache[n]);
    })
    .catch(()=>{});
}

function renderAyahs(ayahs){
  document.getElementById('status').hidden = true;
  document.getElementById('ayahList').innerHTML = ayahs.map((a,i)=>`
    <div class="ayah-block">
      <div class="ayah-arabic">${a.text}<span class="ayah-number-badge">${a.numberInSurah}</span></div>
      ${a.tafsir ? `
        <span class="tafsir-toggle" data-i="${i}">📖 عرض التفسير الميسّر</span>
        <div class="tafsir-text" id="tafsir-${i}">${a.tafsir}</div>
      ` : ''}
    </div>
  `).join('');

  document.querySelectorAll('.tafsir-toggle').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const box = document.getElementById('tafsir-' + btn.dataset.i);
      box.classList.toggle('open');
      btn.textContent = box.classList.contains('open') ? '📖 إخفاء التفسير' : '📖 عرض التفسير الميسّر';
    });
  });
}

renderGrid(SURAH_LIST);
</script>
</body>
</html>
