<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>الرفيق — العقل المدبر</title><link rel="manifest" href="./manifest.json"><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕌</text></svg>"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Tajawal',sans-serif;background:#080B10;color:#F1EFE9;padding-bottom:80px;min-height:100vh}.container{max-width:460px;margin:0 auto;padding:16px}.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 0}.logo{font-size:28px;font-weight:900;color:#E9C767}.sub{font-size:13px;color:#8892A0;margin-top:-4px}.card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.18);border-radius:24px;padding:16px;margin:12px 0}.prayer-hero{background:linear-gradient(145deg,#0F5C3E,#0a3a28);border-radius:24px;padding:20px;border:1px solid rgba(212,175,55,.18)}.prayer-hero .row{display:flex;justify-content:space-between;align-items:center}.prayer-hero .label{color:rgba(255,255,255,.6);font-size:12px}.prayer-hero .pname{font-size:28px;font-weight:700;color:#fff}.prayer-hero .ptime{font-size:34px;font-weight:900;color:#E9C767}.prayer-hero .countdown{background:rgba(0,0,0,.25);padding:4px 14px;border-radius:99px;font-size:20px;font-weight:700}.progress-wrap{height:4px;background:rgba(255,255,255,.1);border-radius:99px;margin-top:12px;overflow:hidden}.progress-fill{height:100%;width:0;background:#D4AF37;border-radius:99px;transition:width 1s}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0}.fcard{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.18);border-radius:16px;padding:14px 6px;text-align:center;text-decoration:none;color:#F1EFE9;transition:.2s;cursor:pointer}.fcard:hover{border-color:#D4AF37;transform:translateY(-3px)}.fcard .icon{font-size:28px;display:block}.fcard .title{font-weight:700;font-size:13px;margin-top:4px}.fcard .desc{font-size:11px;color:#8892A0}.btn{background:linear-gradient(145deg,#D4AF37,#b8962a);color:#080B10;border:none;border-radius:40px;padding:14px;font-weight:700;font-size:18px;width:100%;cursor:pointer;transition:.2s;font-family:inherit}.btn:hover{transform:scale(.97);box-shadow:0 4px 16px rgba(212,175,55,.3)}.bottom-nav{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(92vw,420px);background:rgba(8,11,16,.92);backdrop-filter:blur(20px);border:1px solid rgba(212,175,55,.18);border-radius:99px;display:flex;justify-content:space-around;padding:8px 6px;z-index:999}.nav-item{text-decoration:none;color:#8892A0;font-size:11px;text-align:center;padding:4px 8px;border-radius:30px;transition:.2s;cursor:pointer;background:0 0;border:none;font-family:inherit}.nav-item.active{color:#E9C767;font-weight:700;background:rgba(212,175,55,.15)}.page{display:none}.page.active{display:block}.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0F5C3E;color:#fff;padding:10px 20px;border-radius:99px;font-size:14px;z-index:1000;opacity:0;transition:opacity .5s;pointer-events:none}.toast.show{opacity:1}.offline-badge{background:#e74c3c;color:#fff;padding:4px 12px;border-radius:99px;font-size:11px;display:none}.ayah{background:rgba(255,255,255,.04);border-radius:12px;padding:12px;margin:8px 0;border-right:3px solid #D4AF37;cursor:pointer;transition:.2s}.ayah:hover{background:rgba(255,255,255,.08)}.tafsir-box{background:rgba(212,175,55,.08);border-radius:12px;padding:12px;margin-top:8px;border:1px solid rgba(212,175,55,.2);display:none}.tafsir-box.show{display:block}.city-input{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(212,175,55,.18);background:rgba(255,255,255,.04);color:#fff;font-size:16px;margin:8px 0;font-family:inherit}.city-input::placeholder{color:#8892A0}.city-input:focus{outline:2px solid #D4AF37}</style></head><body><div class="container"><div class="topbar"><div><div class="logo">الرَّفيق</div><div class="sub">رفيقك إلى الخير</div></div><div><span class="offline-badge" id="offlineBadge">📡 غير متصل</span></div></div><div id="home" class="page active"><div class="card"><div id="hijriDisplay" style="color:#E9C767">--</div></div><div class="prayer-hero"><div class="row"><div><div class="label">الصلاة القادمة</div><div class="pname" id="nextName">المغرب</div></div><div class="ptime" id="nextTime">--:--</div></div><div style="display:flex;justify-content:space-between;margin-top:6px"><span class="label">باقي على الصلاة</span><span class="countdown" id="countdownDisplay">--:--:--</span></div><div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div></div><div class="grid"><div class="fcard" onclick="showPage('quran')"><span class="icon">📖</span><span class="title">القرآن</span><span class="desc">114 سورة</span></div><div class="fcard" onclick="showPage('prayer')"><span class="icon">📅</span><span class="title">المواقيت</span><span class="desc">أوقات الصلاة</span></div><div class="fcard" onclick="showPage('azkar')"><span class="icon">🌅</span><span class="title">الأذكار</span><span class="desc">صباح ومساء</span></div></div><button class="btn" id="adhanBtn">🕌 تشغيل الأذان</button><audio id="adhanAudio" src="./adhan.mp3" preload="none"></audio></div><div id="quran" class="page"><div style="display:flex;gap:10px;align-items:center;margin:12px 0"><button class="btn" style="flex:0;padding:8px 16px;font-size:14px;width:auto" onclick="showPage('home')">↩️ رجوع</button><h2 style="flex:1;text-align:center;color:#E9C767">القرآن الكريم</h2></div><div class="card"><div style="display:flex;gap:10px"><input class="city-input" id="surahInput" placeholder="رقم السورة (1-114)" value="1" style="flex:2"><button class="btn" style="flex:0;padding:10px 16px;font-size:14px;width:auto" onclick="loadSurah()">عرض</button></div></div><div id="quranContent" class="card"><p style="color:#8892A0">أدخل رقم السورة واضغط عرض</p></div></div><div id="prayer" class="page"><h2 style="text-align:center;color:#E9C767">مواقيت الصلاة</h2><div class="card"><input class="city-input" id="cityInput" placeholder="اكتب مدينة جديدة (مثل قسنطينة)"><button class="btn" onclick="changeCity()" style="padding:10px;font-size:16px;margin-top:8px">تغيير المدينة</button></div><div id="prayerTimesList" class="card"><p style="color:#8892A0">جاري التحميل...</p></div><button class="btn" onclick="showPage('home')">رجوع</button></div><div id="azkar" class="page"><h2 style="text-align:center;color:#E9C767">الأذكار</h2><div id="azkarContent" class="card"><p style="color:#8892A0">جاري التحميل...</p></div><button class="btn" onclick="showPage('home')">رجوع</button></div></div><nav class="bottom-nav"><button class="nav-item active" data-page="home">🏠<br>الرئيسية</button><button class="nav-item" data-page="quran">📖<br>القرآن</button><button class="nav-item" data-page="prayer">🕌<br>المواقيت</button><button class="nav-item" data-page="azkar">🌅<br>الأذكار</button></nav><div class="toast" id="toast"></div><script>
(function(){'use strict';
let quranData=null,tafsirData=null,azkarData=null;
async function loadLocalFiles(){
 try{const q=await fetch('./quran-local.json');if(q.ok)quranData=await q.json();}catch(e){}
 try{const t=await fetch('./tafsir-saadi.min.json');if(t.ok)tafsirData=await t.json();}catch(e){}
 try{const a=await fetch('./azkar-data.json');if(a.ok)azkarData=await a.json();}catch(e){}
 if(!quranData)showToast('⚠️ القرآن المحلي غير موجود');
 if(!tafsirData)showToast('⚠️ التفسير المحلي غير موجود');
 if(!azkarData)showToast('⚠️ الأذكار المحلية غير موجودة');
}
async function loadSurah(){
 const num=parseInt(document.getElementById('surahInput').value)||1;
 if(num<1||num>114){alert('أدخل رقم سورة بين 1 و 114');return;}
 if(quranData&&quranData[num]){
  const s=quranData[num];let h=`<h3 style="color:#E9C767;text-align:center">سورة ${s.name}</h3><p style="color:#8892A0;text-align:center">${s.englishName} - ${s.revelationType}</p>`;
  s.ayahs.forEach((a,i)=>{const n=i+1;h+=`<div class="ayah" onclick="toggleTafsir(${num},${n})"><span style="color:#D4AF37;font-weight:700">${n}</span> ${a.text}<div id="tafsir_${num}_${n}" class="tafsir-box"></div></div>`});
  document.getElementById('quranContent').innerHTML=h;showToast('✅ تم عرض السورة من الملف المحلي');return;
 }
 document.getElementById('quranContent').innerHTML='<p style="color:#e74c3c">⚠️ لا توجد بيانات محلية للقرآن.</p>';
 showToast('⚠️ تعذر عرض السورة');
}
function toggleTafsir(surah,ayah){
 const box=document.getElementById(`tafsir_${surah}_${ayah}`);
 if(!box)return;
 if(box.classList.contains('show')){box.classList.remove('show');box.innerHTML='';return;}
 box.innerHTML='جاري جلب التفسير...';box.classList.add('show');
 if(tafsirData){
  try{
   let text=null;
   if(tafsirData[surah]&&tafsirData[surah][ayah])text=tafsirData[surah][ayah];
   else if(tafsirData[surah]&&tafsirData[surah].ayahs&&tafsirData[surah].ayahs[ayah])text=tafsirData[surah].ayahs[ayah];
   if(text){box.innerHTML=`<strong>📖 تفسير الآية ${ayah}</strong><br>${text}`;return;}
  }catch(e){}
 }
 box.innerHTML='<span style="color:#8892A0">لا يوجد تفسير لهذه الآية في الملف المحلي</span>';
}
function loadAzkar(){
 if(azkarData){
  let h='';
  if(azkarData.morning){h+=`<h4 style="color:#E9C767">أذكار الصباح</h4>`;azkarData.morning.forEach(d=>{h+=`<div style="padding:8px;margin:4px 0;border-bottom:1px solid rgba(255,255,255,.05)">${d}</div>`})}
  if(azkarData.evening){h+=`<h4 style="color:#E9C767;margin-top:12px">أذكار المساء</h4>`;azkarData.evening.forEach(d=>{h+=`<div style="padding:8px;margin:4px 0;border-bottom:1px solid rgba(255,255,255,.05)">${d}</div>`})}
  document.getElementById('azkarContent').innerHTML=h||'<p style="color:#8892A0">لا توجد أذكار</p>';
 }else document.getElementById('azkarContent').innerHTML='<p style="color:#e74c3c">⚠️ ملف الأذكار غير موجود</p>';
}
let timings={},prayerKeys=['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'],prayerNames=['الفجر','الشروق','الظهر','العصر','المغرب','العشاء'];
let nextMin=0,prevMin=0,currentCity='Algiers';
function toMinutes(s){if(!s)return 0;const p=s.split(':');if(p.length!==2)return 0;const h=parseInt(p[0],10),m=parseInt(p[1],10);if(isNaN(h)||isNaN(m))return 0;return h*60+m;}
function getCity(){return localStorage.getItem('rafeeq_city')||'Algiers';}
function setCity(c){localStorage.setItem('rafeeq_city',c);currentCity=c;}
async function fetchPrayers(){
 const city=getCity();
 try{
  const r=await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=Algeria&method=19`);
  if(r.ok){const j=await r.json();if(j.code===200){const d=j.data;localStorage.setItem('prayer_cache',JSON.stringify({timings:d.timings,hijri:d.date.hijri,gregorian:d.date.gregorian,timestamp:Date.now()}));return d;}}
 }catch(e){}
 const cached=localStorage.getItem('prayer_cache');
 if(cached){try{const d=JSON.parse(cached);showToast('📡 عرض المواقيت المخزنة محلياً');document.getElementById('offlineBadge').style.display='inline-block';return d;}catch(e){}}
 showToast('⚠️ لا توجد مواقيت مخزنة');
 return {timings:{Fajr:'05:00',Sunrise:'06:30',Dhuhr:'13:00',Asr:'16:30',Maghrib:'19:42',Isha:'21:15'},date:{hijri:{day:1,month:{ar:'مُحَرَّم'},year:1448},gregorian:{day:15,month:{en:'يوليو'},year:2026}}};
}
async function updateUI(){
 const data=await fetchPrayers();const t=data.timings;const hijri=data.date.hijri;const greg=data.date.gregorian;
 document.getElementById('hijriDisplay').innerHTML=`${hijri.day} ${hijri.month.ar} ${hijri.year} هـ <small style="color:#8892A0">${greg.day} ${greg.month.en} ${greg.year} م</small>`;
 const now=new Date();const nowMin=now.getHours()*60+now.getMinutes();let idx=-1;
 for(let i=0;i<prayerKeys.length;i++){if(prayerKeys[i]==='Sunrise')continue;if(toMinutes(t[prayerKeys[i]])>nowMin){idx=i;break;}}
 if(idx===-1)idx=0;const key=prayerKeys[idx],name=prayerNames[idx],time=t[key];
 nextMin=toMinutes(time);prevMin=idx===0?toMinutes(t.Isha)-1440:toMinutes(t[prayerKeys[idx-1]]);
 document.getElementById('nextName').textContent=name;document.getElementById('nextTime').textContent=time;
 let list='<table style="width:100%;border-collapse:collapse">';
 for(let i=0;i<prayerKeys.length;i++){if(prayerKeys[i]==='Sunrise')continue;const active=prayerKeys[i]===key?' style="color:#D4AF37;font-weight:700"':'';list+=`<tr><td style="padding:8px;border-bottom:1px solid rgba(255,255,255,.05)">${prayerNames[i]}</td><td style="padding:8px;border-bottom:1px solid rgba(255,255,255,.05);text-align:left"${active}>${t[prayerKeys[i]]}</td></tr>`;}
 list+='</table>';document.getElementById('prayerTimesList').innerHTML=list;
 tick();setInterval(tick,1000);
}
function tick(){
 const now=new Date();const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
 let diff=nextMin*60-nowSec;if(diff<0)diff+=86400;
 const h=String(Math.floor(diff/3600)).padStart(2,'0'),m=String(Math.floor((diff%3600)/60)).padStart(2,'0'),s=String(diff%60).padStart(2,'0');
 document.getElementById('countdownDisplay').textContent=`${h}:${m}:${s}`;
 const total=(nextMin-prevMin)*60,elapsed=total-diff;let progress=0;if(total>0)progress=Math.max(0,Math.min(1,elapsed/total));
 document.getElementById('progressFill').style.width=(progress*100)+'%';
}
function changeCity(){
 const c=document.getElementById('cityInput').value.trim();if(!c)return;setCity(c);showToast('✅ تم تغيير المدينة إلى '+c);location.reload();
}
let audioCtx=null;
function initAudio(){
 try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();}catch(e){}
}
document.addEventListener('click',initAudio,{once:true});
document.addEventListener('touchstart',initAudio,{once:true});
function playAdhan(){
 const audio=document.getElementById('adhanAudio');
 if(!audio){showToast('⚠️ عنصر الصوت غير موجود');return;}
 if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
 audio.currentTime=0;
 const playPromise=audio.play();
 if(playPromise!==undefined){
  playPromise.catch(()=>{
   try{if(audioCtx){const src=audioCtx.createMediaElementSource(audio);src.connect(audioCtx.destination);audio.play();}}catch(e){showToast('⚠️ لا يمكن تشغيل الأذان، تفاعل مع الصفحة أولاً');}
  });
 }
 showToast('🔊 تم تشغيل الأذان');
 if(navigator.vibrate)navigator.vibrate([200,100,200,100,300]);
 if('Notification' in window&&Notification.permission==='granted'){new Notification('🔊 وقت الصلاة',{body:'الرفيق يذكرك بالصلاة',icon:'🕌'});}
}
function checkAdhan(){
 const now=new Date();const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
 const timingsObj=timings||{};
 for(let i=0;i<prayerKeys.length;i++){
  const k=prayerKeys[i];if(k==='Sunrise')continue;
  const pt=timingsObj[k];if(!pt)continue;
  const[h,m]=pt.split(':').map(Number);if(isNaN(h)||isNaN(m))continue;
  const ps=h*3600+m*60;
  if(Math.abs(nowSec-ps)<3){
   const name=prayerNames[i];
   const key='adhan_played_'+k;
   const last=localStorage.getItem(key);
   if(!last||Date.now()-parseInt(last)>300000){
    playAdhan();
    localStorage.setItem(key,String(Date.now()));
    showToast('🔊 وقت صلاة '+name);
   }
   break;
  }
 }
}
document.getElementById('adhanBtn').addEventListener('click',function(){
 if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
 playAdhan();
});
function showPage(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
 document.querySelector(`.nav-item[data-page="${id}"]`)?.classList.add('active');
 if(id==='azkar')loadAzkar();
}
document.querySelectorAll('.nav-item').forEach(b=>{b.addEventListener('click',()=>showPage(b.dataset.page));});
function showToast(msg){
 const el=document.getElementById('toast');
 if(!el)return;el.textContent=msg;el.classList.add('show');clearTimeout(el._timer);el._timer=setTimeout(()=>el.classList.remove('show'),4000);
}
async function init(){
 initAudio();
 await loadLocalFiles();
 const city=getCity();currentCity=city;
 await updateUI();
 setInterval(checkAdhan,5000);
 if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
 if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
 document.getElementById('cityDisplay')?.remove();
 showToast('👋 أهلًا بك في الرفيق');
}
window.showPage=showPage;window.loadSurah=loadSurah;window.toggleTafsir=toggleTafsir;window.changeCity=changeCity;window.loadAzkar=loadAzkar;
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script></body></html>
